name: Generate APK

env:
  main_project_module: app

# Required for softprops/action-gh-release to create the GitHub Release with GITHUB_TOKEN.
permissions:
  contents: write

on:
  push:
    branches:
      - "release/**"
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "v*.*.*"
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set TAG
        if: github.event_name == 'push'
        run: |
          echo "version=$(echo '${{ github.ref_name }}' | awk -F 'v' '{print $2}')" >> $GITHUB_ENV

      - name: Set TAG
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "version=$(echo '${{ inputs.version }}' | awk -F 'v' '{print $2}')" >> $GITHUB_ENV

      - name: Use JDK
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "21"
          cache: "gradle"

      # build.gradle.kts pins ndkVersion 27.0.12077973, which isn't preinstalled on the runner.
      - name: Install NDK & CMake
        run: |
          SDKMANAGER="${ANDROID_HOME:-$ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --install "ndk;27.0.12077973" "cmake;3.22.1"

      - name: Build
        run: |
          export SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)
          echo ${{ secrets.STORE }} | base64 -d > upload.jks
          echo ${{ secrets.LOCAL }} | base64 -d > local.properties
          chmod +x ./gradlew;
          ./gradlew assembleRelease --stacktrace
          rm upload.jks local.properties

      - name: Publish (GitHub)
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: v${{ env.version }}
          tag_name: v${{ env.version }}
          files: |
            ${{ env.main_project_module }}/build/outputs/apk/release/app-release.apk
